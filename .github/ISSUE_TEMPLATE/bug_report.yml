name: Bug Report
description: Report a bug
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: bug_description
    attributes:
      label: Bug Description
      description: Briefly describe what happened.
      placeholder: e.g. twilicParser returns 415 for valid Twilic requests
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide clear steps to reproduce the issue.
      value: |
        1. Step 1
        2. Step 2
        3. Step 3
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: Describe what should happen.
      placeholder: e.g. Handler receives decoded value in c.var.twilicBody
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Describe what actually happens.
      placeholder: e.g. Response is 415 Unsupported Media Type
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Runtime version, OS, and package versions.
      placeholder: |
        - Node.js: 24.x
        - @twilic/hono: 0.1.0
        - hono: 4.x
        - @twilic/core: 3.x
        - OS: macOS 15
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Logs, screenshots, or anything else that might help.
    validations:
      required: false
