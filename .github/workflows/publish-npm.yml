name: Publish NPM

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.1.0)"
        required: true

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag and package version
        run: |
          RELEASE_TAG="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}"
          node ./scripts/verify-tag-version.mjs "$RELEASE_TAG"

      - name: Run tests
        run: pnpm test

      # Trusted publishing (OIDC): requires npm CLI >= 11.5.1 (see npm trusted-publishers docs).
      # Configure the package on npmjs.com: Settings → Trusted Publisher → GitHub Actions
      # (repository twilic/hono, workflow file publish-npm.yml).
      - name: Ensure npm CLI for OIDC trusted publishing
        run: npm install -g "npm@^11.5.1"

      - name: Publish to npm
        run: npm publish --access public --provenance
